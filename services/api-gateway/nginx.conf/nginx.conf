events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;

  upstream user_service {
    server user-service:8081;
  }

  upstream notification_service {
    server notification-service:8086;
  }

  upstream mail_service {
    server mail-service:8087;
  }

  log_format main '$remote_addr - "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;

  server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"status":"ok","service":"api-gateway"}';
    }

    location / {
      try_files $uri $uri/ /index.html;
    }

    location = /api/v1/users {
      proxy_pass http://user_service/api/v1/users;
    }

    location ^~ /api/v1/users/ {
      proxy_pass http://user_service;
    }

    location = /api/v1/notifications {
      proxy_pass http://notification_service/api/v1/notifications;
    }

    location ^~ /api/v1/notifications/ {
      proxy_pass http://notification_service;
    }

    location ^~ /api/v1/notification-preferences/ {
      proxy_pass http://notification_service;
    }

    location ^~ /api/v1/notification-templates/ {
      proxy_pass http://notification_service;
    }

    location ^~ /api/v1/mail/ {
      rewrite ^/api/v1/mail/(.*)$ /api/v1/$1 break;
      proxy_pass http://mail_service;
    }
  }
}
