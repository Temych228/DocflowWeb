global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9001']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:9002']

  - job_name: 'document-service'
    static_configs:
      - targets: ['document-service:9003']

  - job_name: 'task-service'
    static_configs:
      - targets: ['task-service:9004']

  - job_name: 'calendar-service'
    static_configs:
      - targets: ['calendar-service:9005']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:9006']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']