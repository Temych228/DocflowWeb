# ─────────────────────────────────────────────────────────────────────────────
# DMS — Document Management System
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
      - ./postgres/001_auth_init.sql:/docker-entrypoint-initdb.d/01-auth.sql:ro
      - ./postgres/002_user_init.sql:/docker-entrypoint-initdb.d/02-user.sql:ro
      - ./postgres/003_document_init.sql:/docker-entrypoint-initdb.d/03-document.sql:ro
      - ./postgres/004_task_init.sql:/docker-entrypoint-initdb.d/04-task.sql:ro
      - ./postgres/005_calendar_init.sql:/docker-entrypoint-initdb.d/05-calendar.sql:ro
      - ./postgres/006_notification_init.sql:/docker-entrypoint-initdb.d/06-notification.sql:ro
      - ./services/mail-service/migrations/0001_init.sql:/docker-entrypoint-initdb.d/07-mail.sql:ro
    networks:
      - dms_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dms-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-dms_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dms_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dms_redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.9.22
    container_name: dms-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - dms_net

  # ─────────────────────────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────────────────────────

  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: dms-auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      GRPC_PORT: "9001"
      APP_PORT: "8082"
      METRICS_PORT: "9202"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/auth_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: auth_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "0"
      NOTIFICATION_SERVICE_ADDR: notification-service:9006
      USER_SERVICE_ADDR: user-service:9002
    ports:
      - "9001:9001"
      - "8082:8082"
      - "9202:9202"
    networks:
      - dms_net

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: dms-user
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      GRPC_PORT: "9002"
      APP_PORT: "8081"
      METRICS_PORT: "9201"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/user_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: user_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "1"
      CACHE_TTL: "5m"
    ports:
      - "9002:9002"
      - "8081:8081"
      - "9201:9201"
    networks:
      - dms_net

  document-service:
    build:
      context: ./services/document-service
      dockerfile: Dockerfile
    container_name: dms-document
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      notification-service:
        condition: service_started
      calendar-service:
        condition: service_started
    env_file: .env
    environment:
      GRPC_PORT: "9003"
      APP_PORT: "8083"
      METRICS_PORT: "9203"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/doc_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: doc_db
      DB_SSLMODE: disable
      CALENDAR_SERVICE_ADDR: calendar-service:9005
      NOTIFICATION_SERVICE_ADDR: notification-service:9006
      USER_SERVICE_ADDR: user-service:9002
    ports:
      - "9003:9003"
      - "8083:8083"
      - "9203:9203"
    networks:
      - dms_net

  task-service:
    build:
      context: ./services/task-service
      dockerfile: Dockerfile
    container_name: dms-task
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_started
      calendar-service:
        condition: service_started
    env_file: .env
    environment:
      GRPC_PORT: "9004"
      APP_PORT: "8084"
      METRICS_PORT: "9204"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/task_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: task_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "6"
      NOTIFICATION_SERVICE_ADDR: notification-service:9006
      CALENDAR_SERVICE_ADDR: calendar-service:9005
    ports:
      - "9004:9004"
      - "8084:8084"
      - "9204:9204"
    networks:
      - dms_net

  calendar-service:
    build:
      context: ./services/calendar-service
      dockerfile: Dockerfile
    container_name: dms-calendar
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      GRPC_PORT: "9005"
      APP_PORT: "8085"
      METRICS_PORT: "9205"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/cal_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: cal_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "2"
      CACHE_TTL: "5m"
    ports:
      - "9005:9005"
      - "8085:8085"
      - "9205:9205"
    networks:
      - dms_net

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: dms-notification
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    env_file: .env
    environment:
      GRPC_PORT: "9006"
      APP_PORT: "8086"
      METRICS_PORT: "9206"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/notif_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: notif_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "4"
      NATS_URL: nats://nats:4222
      LOG_SUBJECT: queue.logs
      MAIL_JOB_SUBJECT: queue.mail.jobs
      NOTIFICATION_SUBJECT: queue.notification.events
      USER_SERVICE_ADDR: user-service:9002
    ports:
      - "9006:9006"
      - "8086:8086"
      - "9206:9206"
    networks:
      - dms_net

  mail-service:
    build:
      context: .
      dockerfile: ./services/mail-service/Dockerfile
    container_name: dms-mail
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    env_file: .env
    environment:
      GRPC_PORT: "9007"
      APP_PORT: "8087"
      METRICS_PORT: "9207"
      DATABASE_URL: "postgres://${POSTGRES_USER:-dms}:${POSTGRES_PASSWORD:-dms}@postgres:5432/mail_db?sslmode=disable"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-dms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-dms}
      DB_NAME: mail_db
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "5"
      NATS_URL: nats://nats:4222
      LOG_SUBJECT: queue.logs
      MAIL_JOB_SUBJECT: queue.mail.jobs
    ports:
      - "8087:8087"
      - "9007:9007"
      - "9207:9207"
    networks:
      - dms_net

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: dms-gateway
    restart: unless-stopped
    depends_on:
      - redis
      - auth-service
      - user-service
      - document-service
      - task-service
      - calendar-service
      - notification-service
      - mail-service
    env_file: .env
    environment:
      PORT: "8080"
      AUTH_SERVICE_ADDR: auth-service:9001
      USER_SERVICE_ADDR: user-service:9002
      DOCUMENT_SERVICE_ADDR: document-service:9003
      TASK_SERVICE_ADDR: task-service:9004
      CALENDAR_SERVICE_ADDR: calendar-service:9005
      NOTIFICATION_SERVICE_ADDR: notification-service:9006
      MAIL_SERVICE_ADDR: mail-service:9007
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dms_redis}
      REDIS_DB: "7"
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks:
      - dms_net

  # ─────────────────────────────────────────────────────────────────
  # Observability
  # ─────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dms-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - dms_net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: dms-grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    networks:
      - dms_net
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: dms-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - dms_net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  dms_net:
    driver: bridge