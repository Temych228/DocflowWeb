name: DocflowWeb Backend CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Initialize workspace
        run: |
          rm -f go.work

          go work init .

          for dir in services/*/; do
            if [ -f "${dir}go.mod" ]; then
              go work use "$dir"
            fi
          done

          go work sync

      - name: Show workspace
        run: |
          cat go.work

      - name: Run vet
        run: |
          go vet ./...

      - name: Build
        run: |
          go build ./...

      - name: Test
        run: |
          go test ./... -v