name: Docflow Backend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  audit:
    name: Check ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: [
          "api-gateway",
          "auth-service",
          "calendar-service",
          "document-service",
          "mail-service",
          "notification-service",
          "user-service",
          "task-service"
        ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.service }}-${{ hashFiles(format('services/{0}/go.sum', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.service }}-

      - name: Check code formatting (Go fmt)
        run: |
          cd services/${{ matrix.service }}
          if ls *.go >/dev/null 2>&1 || [ -d internal ] || [ -d cmd ]; then
            if [ -n "$(gofmt -l .)" ]; then
              echo "Code is not formatted! Please run 'gofmt -w .'"
              gofmt -l .
              exit 1
            fi
          fi

      - name: Run Go Vet (Static Analysis)
        run: |
          cd services/${{ matrix.service }}
          if [ -f go.mod ]; then
            go vet ./...
          else
            echo "go.mod file not found, skipping go vet for ${{ matrix.service }}"
          fi