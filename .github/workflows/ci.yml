name: DocflowWeb Backend CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  services:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - calendar-service
          - document-service
          - mail-service
          - notification-service
          - task-service
          - user-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true
          cache-dependency-path: |
            go.sum
            services/**/go.sum

      - name: Show Go version
        run: |
          go version
          go env

      - name: Download dependencies
        run: |
          go mod download

      - name: Verify modules
        run: |
          go mod verify

      - name: Check formatting
        shell: bash
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Run go vet
        run: |
          go vet ./...

      - name: Build
        run: |
          go build ./...

      - name: Run tests
        run: |
          go test ./... -v