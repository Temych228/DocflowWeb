name: DocflowWeb Backend CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  audit:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true

      - name: Print Go version
        run: go version

      - name: Download dependencies
        run: |
          go mod tidy
          go mod download

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Formatting issues found"
            gofmt -l .
            exit 1
          fi

      - name: Run static analysis
        run: |
          go vet ./...

      - name: Build all packages
        run: |
          go build ./...

      - name: Run unit tests
        run: |
          go test ./... -v -race